services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: nook
      POSTGRES_PASSWORD: nook
      POSTGRES_DB: nook
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nook"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: ghcr.io/and-ri/nook-server:latest
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://nook:nook@postgres:5432/nook
      JWT_SECRET: ${JWT_SECRET}
      ORIGIN_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ghcr.io/and-ri/nook-web:latest
    ports:
      - "3001:3001"
    environment:
      API_BASE_URL: http://server:3001
    depends_on:
      - server

volumes:
  postgres_data:
